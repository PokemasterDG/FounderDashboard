name: FounderDashboard
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
fileGroups:
  - README.md
  - sources_acknowledgements.md
  - Resources
settings:
  base:
    PRODUCT_NAME: FounderDashboard
    PRODUCT_BUNDLE_IDENTIFIER: com.dennisgill.FounderDashboard
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: YES
    GENERATE_APP_INTENTS_METADATA: NO
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    INFOPLIST_KEY_CFBundleDisplayName: FounderDashboard
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.business
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
targets:
  FounderDashboard:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dennisgill.FounderDashboard
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 Dennis Gill"
    dependencies: []
  FounderDashboardCompanion:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - App/AppModel.swift
          - App/FounderDashboardApp.swift
          - App/FounderDashboardRootView.swift
          - Services/DocumentOpening.swift
          - Services/ImportedReportAnalyzer.swift
          - Services/ImportedReportStore.swift
          - Views/Components/DataStatusCard.swift
          - Views/Dashboard/DashboardOverviewView.swift
          - Views/Decked/DeckedBuilderView.swift
          - Views/Documents/DocumentsView.swift
          - Views/Documents/ImportsView.swift
          - Views/Documents/SourcesView.swift
          - Views/Funding/LGSFundingView.swift
      - path: Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_NAME: FounderDashboard Companion
        PRODUCT_BUNDLE_IDENTIFIER: com.dennisgill.FounderDashboardCompanion
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_KEY_CFBundleDisplayName: FounderDashboard Companion
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 Dennis Gill"
    dependencies: []
schemes:
  FounderDashboard:
    build:
      targets:
        FounderDashboard: all
    run:
      config: Debug
    archive:
      config: Release
  FounderDashboardCompanion:
    build:
      targets:
        FounderDashboardCompanion: all
    run:
      config: Debug
    archive:
      config: Release
