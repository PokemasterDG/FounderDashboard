name: FounderDashboard
options:
  minimumXcodeGenVersion: 2.39.0
  deploymentTarget:
    macOS: "15.0"
fileGroups:
  - README.md
  - sources_acknowledgements.md
  - Resources
settings:
  base:
    PRODUCT_NAME: FounderDashboard
    PRODUCT_BUNDLE_IDENTIFIER: com.dennisgill.FounderDashboard
    SWIFT_VERSION: 6.0
    GENERATE_INFOPLIST_FILE: YES
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    INFOPLIST_KEY_CFBundleDisplayName: FounderDashboard
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.business
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
targets:
  FounderDashboard:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dennisgill.FounderDashboard
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 Dennis Gill"
    dependencies: []
schemes:
  FounderDashboard:
    build:
      targets:
        FounderDashboard: all
    run:
      config: Debug
    archive:
      config: Release
